name: Vercel Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_TRIVIA_TOKEN }}

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate required Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing Vercel token. Set repository secret VERCEL_TOKEN (or VERCEL_TRIVIA_TOKEN)."
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing repository secret VERCEL_ORG_ID."
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing repository secret VERCEL_PROJECT_ID."
            exit 1
          fi

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy project artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
